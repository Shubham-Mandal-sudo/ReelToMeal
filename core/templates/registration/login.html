{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-sm border border-gray-100 mt-10">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-indigo-900">Welcome Back</h2>
        <p class="text-gray-500 mt-2">Log in to access your recipe history.</p>
    </div>

    {% if error %}
    <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-6 border border-red-100 text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-5">
        {% csrf_token %}
        
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" name="username" required 
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-gray-700 bg-gray-50 focus:bg-white"
                   placeholder="Enter your username">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" required 
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-gray-700 bg-gray-50 focus:bg-white"
                   placeholder="••••••••">
        </div>

        <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-semibold hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all active:scale-[0.98]">
            Log In
        </button>
    </form>

    <p class="text-center mt-6 text-sm text-gray-600">
        Don't have an account? 
        <a href="{% url 'signup' %}" class="text-indigo-600 font-semibold hover:underline">Sign up here</a>
    </p>
</div>
{% endblock %}
